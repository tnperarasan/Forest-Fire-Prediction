<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Fire Prediction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(to right, #ff9966, #ff5e62);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:700px;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#ff5e62;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#ff5e62;
}

button{
    width:100%;
    padding:14px;
    background:#ff5e62;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#e74c3c;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="container">

    <h1>🔥 Forest Fire Prediction</h1>

    <form action="/predictdata" method="POST">

        <div class="form-group">
            <label>Temperature</label>
            <input type="number" step="any" name="Temperature" placeholder="29" required>
        </div>

        <div class="form-group">
            <label>Relative Humidity (RH)</label>
            <input type="number" step="any" name="RH" placeholder="74" required>
        </div>

        <div class="form-group">
            <label>Wind Speed (Ws)</label>
            <input type="number" step="any" name="Ws" placeholder="19" required>
        </div>

        <div class="form-group">
            <label>Rain</label>
            <input type="number" step="any" name="Rain" placeholder="0.1" required>
        </div>

        <div class="form-group">
            <label>FFMC</label>
            <input type="number" step="any" name="FFMC" placeholder="75.8" required>
        </div>

        <div class="form-group">
            <label>DMC</label>
            <input type="number" step="any" name="DMC" placeholder="3.6" required>
        </div>

        <div class="form-group">
            <label>ISI</label>
            <input type="number" step="any" name="ISI" placeholder="2.1" required>
        </div>

        <div class="form-group">
            <label>Classes (0 = Not Fire, 1 = Fire)</label>
            <input type="number" min="0" max="1" name="Classes" placeholder="0" required>
        </div>

        <div class="form-group">
            <label>Region (0 = Bejaia, 1 = Sidi-Bel Abbes)</label>
            <input type="number" min="0" max="1" name="Region" placeholder="0" required>
        </div>

        <button type="submit">Predict FWI</button>

    </form>

    {% if results %}
    <div class="result">
        Predicted FWI: {{ results }}
    </div>
    {% endif %}

</div>

</body>
</html>
